name: compact_test
version: "1.0"
base_config: "@kt-biome/creatures/swe"

controller:
  model: gpt-5.4
  auth_mode: codex-oauth
  tool_format: native

input:
  type: tui
  prompt: "> "

output:
  type: tui
  controller_direct: true

# Auto-compact config (override defaults)
compact:
  max_tokens: 15000
  threshold: 0.80      # trigger at 8k tokens
  target: 0.40         # aim for 4k after compact
  keep_recent_turns: 4
