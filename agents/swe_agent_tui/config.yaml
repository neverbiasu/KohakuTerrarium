# SWE Agent (TUI Mode)
# Same as swe_agent but uses TUI input/output for richer terminal experience

name: swe_agent_tui
version: "1.0"

controller:
  # model: "${OPENROUTER_MODEL:google/gemini-3.1-pro-preview}"
  model: "${OPENROUTER_MODEL:google/gemini-3-flash-preview}"
  temperature: 0.5
  max_tokens: 512000
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1
  tool_format: native

system_prompt_file: prompts/system.md

# TUI input/output - shared session for coordinated terminal access
input:
  type: tui
  prompt: "You: "

output:
  type: tui
  controller_direct: true

# Same tools as swe_agent
tools:
  - name: bash
    type: builtin
  - name: python
    type: builtin
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: glob
    type: builtin
  - name: grep
    type: builtin
  - name: think
    type: builtin
  - name: scratchpad
    type: builtin
  - name: ask_user
    type: builtin

# Same sub-agents as swe_agent
subagents:
  - name: explore
    type: builtin
    extra_prompt: "Focus on the project's language and conventions."
  - name: plan
    type: builtin
    extra_prompt_file: prompts/plan_extra.md
  - name: worker
    type: builtin
  - name: critic
    type: builtin
  - name: summarize
    type: builtin

termination:
  max_turns: 100
  keywords: ["TASK_COMPLETE"]
