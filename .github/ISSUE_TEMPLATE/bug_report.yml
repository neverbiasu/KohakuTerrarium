name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `kt run @kt-biome/creatures/swe`
        2. Send "..."
        3. Observe that...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any error output or tracebacks.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Drag and drop screenshots here, paste image links, or add short recordings.

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: How are you running KohakuTerrarium?
      options:
        - CLI (kt run)
        - TUI (kt run --mode tui)
        - Web dashboard (kt serve)
        - Desktop app
        - Programmatic (Python API)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `kt --version` or `pip show kohakuterrarium`
      placeholder: "1.0.0b8"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.13"
    validations:
      required: true
